                            <td class="border py-2 px-2">18225</td><td class="border py-2 px-2">12993</td><td class="border py-2 px-2 text-green-600">40.27%</td>
                            <td class="border py-2 px-2 text-indigo-700">56868</td><td class="border py-2 px-2 text-indigo-700">50531</td><td class="border py-2 px-2 text-green-600">12.54%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // 澶栭儴鏁版嵁鏂囦欢 URL
        const builtInDataStr = '';
        
        let trafficData = [];
        let charts = {};

        // 瑙ｆ瀽鍐呯疆TSV鏁版嵁
        function parseTSVToJSON(tsv) {
            const lines = tsv.trim().split('\n');
            const headers = lines[0].split('\t').map(h => h.trim());
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = lines[i].split('\t').map(v => v.trim());
                let obj = {};
                
                headers.forEach((header, index) => {
                    let val = values[index] !== undefined ? values[index] : '';
                    if (val.startsWith('(') && val.endsWith(')')) {
                        val = '-' + val.slice(1, -1);
                    }
                    val = val.replace(/,/g, '');
                    if (header === '鏈? && val.includes('鏈?)) {
                        val = val.replace('鏈?, '');
                    }
                    obj[header] = val;
                });
                result.push(obj);
            }
            return result;
        }

        function formatMoney(num) { return (num / 10000).toFixed(2) + '涓?; }
        function formatNumber(num) { return num.toLocaleString(); }
        function getYoY(current, last) {
            if (!last || last === 0) return { text: '-', color: 'text-gray-500' };
            const pct = ((current - last) / last) * 100;
            const sign = pct >= 0 ? '+' : '';
            return {
                text: `${sign}${pct.toFixed(1)}% YoY`,
                color: pct >= 0 ? 'text-red-500' : 'text-green-500'
            };
        }

        function renderDashboard() {
            const yearFilter = parseInt(document.getElementById('filterYear').value);
            const monthFilter = document.getElementById('filterMonth').value;
            const categoryFilter = document.getElementById('filterCategory').value; // 鑾峰彇娓犻亾绛涢€夊€?

            let fData = trafficData;
            // 搴旂敤鍏ㄥ眬绛涢€?
            if (monthFilter !== 'ALL') fData = fData.filter(d => d['鏈?] == monthFilter);
            if (categoryFilter !== 'ALL') fData = fData.filter(d => (d['娓犻亾绫诲埆'] || '').includes(categoryFilter));

            const aggregateTraffic = (data, yr) => {
                let yData = data.filter(d => d['骞?] == yr);
                let res = { total: 0, highTotal: 0, gmv: 0 };
                yData.forEach(d => {
                    let num = parseFloat(d['杩涢噺浜烘暟']) || 0;
                    let mny = parseFloat(d['鎴潰鍑€GMV']) || 0;
                    res.total += num;
                    res.gmv += mny;
                    if ((d['娓犻亾绫诲埆'] || '').includes('楂樿浆')) res.highTotal += num;
                });
                res.highPct = res.total > 0 ? (res.highTotal / res.total) * 100 : 0;
                res.ltv = res.total > 0 ? (res.gmv / res.total) : 0;
                return res;
            };

            const currentYearData = aggregateTraffic(fData, yearFilter);
            const lastYearData = aggregateTraffic(fData, yearFilter - 1);

            const trafficYoY = getYoY(currentYearData.total, lastYearData.total);
            const gmvYoY = getYoY(currentYearData.gmv, lastYearData.gmv);
            const ltvYoY = getYoY(currentYearData.ltv, lastYearData.ltv);
            const pctDiff = currentYearData.highPct - lastYearData.highPct;
            const pctColor = pctDiff >= 0 ? 'text-red-500' : 'text-green-500';

            // 娓叉煋 Board 1
            document.getElementById('board1-cards').innerHTML = `
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between">
                    <div class="text-sm text-gray-500 mb-1">鎬昏繘閲忎汉鏁?/div>
                    <div class="text-2xl font-bold text-gray-800">${formatNumber(currentYearData.total)}</div>
                    <div class="text-sm font-medium mt-2 ${trafficYoY.color}">${trafficYoY.text}</div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between">
                    <div class="text-sm text-gray-500 mb-1">鎴潰鍑€钀ユ敹(GMV)</div>
                    <div class="text-2xl font-bold text-indigo-600">楼${formatMoney(currentYearData.gmv)}</div>
                    <div class="text-sm font-medium mt-2 ${gmvYoY.color}">${gmvYoY.text}</div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between">
                    <div class="text-sm text-gray-500 mb-1">楂樿浆娴侀噺鍗犳瘮</div>
                    <div class="text-2xl font-bold text-gray-800">${currentYearData.highPct.toFixed(1)}%</div>
                    <div class="text-sm font-medium mt-2 ${pctColor}">${pctDiff >=0 ? '+':''}${pctDiff.toFixed(1)}% YoY</div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between">
                    <div class="text-sm text-gray-500 mb-1">浜哄潎鍑€LTV</div>
                    <div class="text-2xl font-bold text-gray-800">楼${currentYearData.ltv.toFixed(2)}</div>
                    <div class="text-sm font-medium mt-2 ${ltvYoY.color}">${ltvYoY.text}</div>
                </div>
            `;

            // ===== 娓叉煋鍒嗘湀澶х洏璇︽儏鏄庣粏琛?=====
            const tableMonths = [5, 6, 7, 8, 9];
            
            const getStats = (yr, mo) => {
                let data = fData.filter(d => d['骞?] == yr && d['鏈?] == mo);
                let total = 0, high = 0, gmv = 0;
                data.forEach(d => {
                    let n = parseFloat(d['杩涢噺浜烘暟']) || 0;
                    total += n;
                    gmv += parseFloat(d['鎴潰鍑€GMV']) || 0;
                    if ((d['娓犻亾绫诲埆'] || '').includes('楂樿浆')) high += n;
                });
                let low = total - high;
                return { total, gmv, high, low };
            };

            const targetStats = tableMonths.map(m => getStats(yearFilter, m));
            const baseStats = tableMonths.map(m => getStats(yearFilter - 1, m));

            const calcQ3 = (statsArray) => {
                let q3 = { total: 0, gmv: 0, high: 0, low: 0 };
                for(let i = 2; i <= 4; i++) {
                    q3.total += statsArray[i].total;
                    q3.gmv += statsArray[i].gmv;
                    q3.high += statsArray[i].high;
                    q3.low += statsArray[i].low;
                }
                return q3;
            };

            const targetQ3 = calcQ3(targetStats);
            const baseQ3 = calcQ3(baseStats);

            const getTableYoYBlock = (curr, base) => {
                if (base === 0 && curr === 0) return '-';
                if (base === 0) return '<span class="bg-green-500 text-white px-2 py-1 rounded text-xs">+100%</span>';
                let diff = ((curr - base) / base * 100);
                let sign = diff > 0 ? '+' : '';
                let color = diff > 0 ? 'bg-green-500' : (diff < 0 ? 'bg-red-500' : 'bg-gray-400');
                return `<span class="${color} text-white px-2 py-1 rounded text-xs inline-block min-w-[60px]">${sign}${diff.toFixed(2)}%</span>`;
            };

            let theadHtml = `<tr class="bg-gray-200 border-b border-gray-300 text-gray-700">
                <th class="border border-gray-300 py-2 px-4 font-bold w-24">骞翠唤</th>
                <th class="border border-gray-300 py-2 px-4 font-bold w-36">鎸囨爣</th>
                ${tableMonths.map(m => `<th class="border border-gray-300 py-2 px-4 font-bold">${m}鏈?/th>`).join('')}
                <th class="border border-gray-300 py-2 px-4 font-bold bg-indigo-100 text-indigo-800">Q3姹囨€?(7-9鏈?</th>
            </tr>`;

            const buildRow = (title, field, stats, q3Stat, isBold = false, isLast = false) => {
                let borderClass = isLast ? 'border-b-2 border-gray-800' : 'border-b border-gray-200';
                return `
                <tr class="${borderClass} hover:bg-gray-50 bg-white">
                    <td class="border border-gray-200 py-2 px-4 text-center">${title}</td>
                    ${tableMonths.map((m, i) => `<td class="border border-gray-200 py-2 px-4">${Math.round(stats[i][field])}</td>`).join('')}
                    <td class="border border-gray-200 py-2 px-4 bg-indigo-50 ${isBold ? 'font-bold text-indigo-700' : ''}">${Math.round(q3Stat[field])}</td>
                </tr>`;
            };

            const buildYoYRow = (title, field, isLast = false) => {
                let borderClass = isLast ? 'border-b-2 border-gray-800' : 'border-b border-gray-200';
                return `
                <tr class="${borderClass} hover:bg-gray-50 bg-white">
                    <td class="border border-gray-200 py-2 px-4 text-center">${title}</td>
                    ${tableMonths.map((m, i) => `<td class="border border-gray-200 py-2 px-4">${getTableYoYBlock(targetStats[i][field], baseStats[i][field])}</td>`).join('')}
                    <td class="border border-gray-200 py-2 px-4 bg-indigo-50">${getTableYoYBlock(targetQ3[field], baseQ3[field])}</td>
                </tr>`;
            };

            // 鏄庣粏琛ㄩ『搴? 鍑€钀ユ敹 -> 娴侀噺鏁?-> 楂樿浆娴侀噺鏁?-> 浣庤浆娴侀噺鏁?
            let tbodyHtml = `
                <tr class="border-b border-gray-200 hover:bg-gray-50 bg-white">
                    <td rowspan="4" class="border border-gray-200 font-bold align-middle bg-gray-50 text-center">鍚屾瘮瓒嬪娍</td>
                    <td class="border border-gray-200 py-2 px-4 text-center">鍑€钀ユ敹</td>
                    ${tableMonths.map((m, i) => `<td class="border border-gray-200 py-2 px-4">${getTableYoYBlock(targetStats[i].gmv, baseStats[i].gmv)}</td>`).join('')}
                    <td class="border border-gray-200 py-2 px-4 bg-indigo-50">${getTableYoYBlock(targetQ3.gmv, baseQ3.gmv)}</td>
                </tr>
                ${buildYoYRow('娴侀噺鏁?, 'total')}
                ${buildYoYRow('楂樿浆娴侀噺鏁?, 'high')}
                ${buildYoYRow('浣庤浆娴侀噺鏁?, 'low', true)}

                <tr class="border-b border-gray-200 hover:bg-gray-50 bg-white">
                    <td rowspan="4" class="border border-gray-200 font-bold align-middle bg-gray-50 text-center">${yearFilter}骞?/td>
                    <td class="border border-gray-200 py-2 px-4 text-center">鍑€钀ユ敹</td>
                    ${tableMonths.map((m, i) => `<td class="border border-gray-200 py-2 px-4">${Math.round(targetStats[i].gmv)}</td>`).join('')}
                    <td class="border border-gray-200 py-2 px-4 bg-indigo-50 font-bold text-indigo-700">${Math.round(targetQ3.gmv)}</td>
                </tr>
                ${buildRow('娴侀噺鏁?, 'total', targetStats, targetQ3, true)}
                ${buildRow('楂樿浆娴侀噺鏁?, 'high', targetStats, targetQ3)}
                ${buildRow('浣庤浆娴侀噺鏁?, 'low', targetStats, targetQ3, false, true)}
                
                <tr class="border-b-2 border-gray-800"><td colspan="8" class="p-0 border-0 h-3 bg-gray-100"></td></tr>

                <tr class="border-b border-gray-200 hover:bg-gray-50 bg-white">
                    <td rowspan="4" class="border border-gray-200 font-bold align-middle bg-gray-50 text-center">${yearFilter - 1}骞?/td>
                    <td class="border border-gray-200 py-2 px-4 text-center">鍑€钀ユ敹</td>
                    ${tableMonths.map((m, i) => `<td class="border border-gray-200 py-2 px-4">${Math.round(baseStats[i].gmv)}</td>`).join('')}
                    <td class="border border-gray-200 py-2 px-4 bg-indigo-50 font-bold text-indigo-700">${Math.round(baseQ3.gmv)}</td>
                </tr>
                ${buildRow('娴侀噺鏁?, 'total', baseStats, baseQ3, true)}
                ${buildRow('楂樿浆娴侀噺鏁?, 'high', baseStats, baseQ3)}
                ${buildRow('浣庤浆娴侀噺鏁?, 'low', baseStats, baseQ3, false, true)}
            `;
            document.getElementById('detail-table').innerHTML = `<thead>${theadHtml}</thead><tbody>${tbodyHtml}</tbody>`;

            // ===== 娓叉煋鍥捐〃锛欱oard 2 =====
            let chartData = {
                currHigh: [], currLow: [], currGmv: [],
                lastHigh: [], lastLow: [], lastGmv: []
            };

            tableMonths.forEach((m, i) => {
                chartData.currHigh.push(targetStats[i].high);
                chartData.currLow.push(targetStats[i].low);
                chartData.currGmv.push(targetStats[i].gmv);
                
                chartData.lastHigh.push(baseStats[i].high);
                chartData.lastLow.push(baseStats[i].low);
                chartData.lastGmv.push(baseStats[i].gmv);
            });

            charts.board2.setOption({
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' } 
                },
                legend: { 
                    data: [
                        `${yearFilter-1}骞?楂樿浆杩涢噺`, `${yearFilter-1}骞?浣庤浆杩涢噺`, `${yearFilter-1}骞?鎬籊MV`, 
                        `${yearFilter}骞?楂樿浆杩涢噺`, `${yearFilter}骞?浣庤浆杩涢噺`, `${yearFilter}骞?鎬籊MV`
                    ], 
                    bottom: 0 
                },
                grid: { left: '3%', right: '3%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: [{ 
                    type: 'category', 
                    data: ['5鏈?, '6鏈?, '7鏈?, '8鏈?, '9鏈?],
                    axisPointer: { type: 'shadow' }
                }],
                yAxis: [
                    { type: 'value', name: '杩涢噺浜烘暟' },
                    { type: 'value', name: '钀ユ敹(鍏?', splitLine: { show: false } }
                ],
                series: [
                    { 
                        name: `${yearFilter-1}骞?楂樿浆杩涢噺`, type: 'bar', stack: 'LastYear', 
                        data: chartData.lastHigh, itemStyle: { color: '#818cf8', opacity: 0.8 }, barMaxWidth: 40 
                    },
                    { 
                        name: `${yearFilter-1}骞?浣庤浆杩涢噺`, type: 'bar', stack: 'LastYear', 
                        data: chartData.lastLow, itemStyle: { color: '#cbd5e1', opacity: 0.8 }, barMaxWidth: 40 
                    },
                    { 
                        name: `${yearFilter-1}骞?鎬籊MV`, type: 'line', yAxisIndex: 1, 
                        data: chartData.lastGmv, itemStyle: { color: '#34d399' }, 
                        lineStyle: { type: 'dashed', width: 2 }, symbol: 'emptyCircle', smooth: true 
                    },
                    { 
                        name: `${yearFilter}骞?楂樿浆杩涢噺`, type: 'bar', stack: 'CurrYear', 
                        data: chartData.currHigh, itemStyle: { color: '#4f46e5' }, barMaxWidth: 40 
                    },
                    { 
                        name: `${yearFilter}骞?浣庤浆杩涢噺`, type: 'bar', stack: 'CurrYear', 
                        data: chartData.currLow, itemStyle: { color: '#94a3b8' }, barMaxWidth: 40 
                    },
                    { 
                        name: `${yearFilter}骞?鎬籊MV`, type: 'line', yAxisIndex: 1, 
                        data: chartData.currGmv, itemStyle: { color: '#10b981' }, 
                        lineStyle: { width: 3 }, symbol: 'circle', symbolSize: 6, smooth: true 
                    }
                ]
            }, true);

            // ===== 娓叉煋 Board 3: 浜岀骇娓犻亾 娴侀噺鍒嗘湀鍚屾瘮涓嬫帰 (鍔ㄦ€佽仛鍚堢増) =====
            const b3Months = [5, 6, 7, 8, 9];
            let highChannelAgg = {};
            let lowChannelAgg = {};

            // 1. 杩囨护骞舵彁鍙栭珮杞拰浣庤浆娴侀噺 (渚濊禆宸茶鍏ㄥ眬绛涢€夎繃婊ゅソ鐨?fData)
            fData.forEach(d => {
                let y = parseInt(d['骞?]);
                let m = parseInt(d['鏈?]);
                let cat = d['娓犻亾绫诲埆'] || '';
                
                if (b3Months.includes(m) && (y === yearFilter || y === yearFilter - 1)) {
                    let ch = d['浜岀骇娓犻亾'] || '鏈煡娓犻亾';
                    let vol = parseFloat(d['杩涢噺浜烘暟']) || 0;
                    
                    let targetAgg = null;
                    if (cat.includes('楂樿浆')) targetAgg = highChannelAgg;
                    else if (cat.includes('浣庤浆')) targetAgg = lowChannelAgg;
                    
                    if (targetAgg) {
                        if (!targetAgg[ch]) {
                            targetAgg[ch] = { 
                                curr: {5:0, 6:0, 7:0, 8:0, 9:0}, 
                                last: {5:0, 6:0, 7:0, 8:0, 9:0}, 
                                totalCurr: 0 
                            };
                        }
                        if (y === yearFilter) {
                            targetAgg[ch].curr[m] += vol;
                            targetAgg[ch].totalCurr += vol;
                        } else {
                            targetAgg[ch].last[m] += vol;
                        }
                    }
                }
            });

            // ===== 鏂板锛氳绠楀苟娓叉煋娓犻亾杩涢噺缁濆鍊煎彉鍖?Top 5 =====
            let allAggChannels = [];
            const collectForTop5 = (aggObj) => {
                for (let ch in aggObj) {
                    let totalCurr = 0;
                    let totalLast = 0;
                    b3Months.forEach(m => {
                        totalCurr += aggObj[ch].curr[m] || 0;
                        totalLast += aggObj[ch].last[m] || 0;
                    });
                    let diff = totalCurr - totalLast;
                    if (totalCurr > 0 || totalLast > 0) {
                        allAggChannels.push({ name: ch, diff: diff, curr: totalCurr, last: totalLast });
                    }
                }
            };
            collectForTop5(highChannelAgg);
            collectForTop5(lowChannelAgg);

            // 鎸夌収缁濆澧為噺鎺掑簭
            allAggChannels.sort((a, b) => b.diff - a.diff);
            
            let top5Increase = allAggChannels.filter(d => d.diff > 0).slice(0, 5);
            let top5Decrease = [...allAggChannels].reverse().filter(d => d.diff < 0).slice(0, 5);

            const renderTopList = (list, isIncrease) => {
                if (list.length === 0) return '<div class="text-gray-400 text-xs py-2 text-center">鏃犳暟鎹?/div>';
                return list.map(d => {
                    let color = isIncrease ? 'text-green-600' : 'text-red-600';
                    let sign = isIncrease ? '+' : '';
                    return `<div class="flex justify-between items-center text-xs py-1.5 border-b border-gray-100 last:border-0">
                        <span class="text-gray-700 truncate pr-2 font-medium" title="${d.name}">${d.name}</span>
                        <span class="font-bold ${color}">${sign}${Math.round(d.diff)}</span>
                    </div>`;
                }).join('');
            };

            let topChangesHtml = `
                <div class="flex-1 bg-green-50 p-4 rounded-lg shadow-sm border border-green-100">
                    <div class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1 border-b border-green-200 pb-2">
                        <i data-lucide="trending-up" class="w-4 h-4 text-green-600"></i>杩涢噺缁濆鍊煎鍔?Top 5 (瀵规瘮鍘诲勾)
                    </div>
                    ${renderTopList(top5Increase, true)}
                </div>
                <div class="flex-1 bg-red-50 p-4 rounded-lg shadow-sm border border-red-100">
                    <div class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1 border-b border-red-200 pb-2">
                        <i data-lucide="trending-down" class="w-4 h-4 text-red-600"></i>杩涢噺缁濆鍊煎噺灏?Bottom 5 (瀵规瘮鍘诲勾)
                    </div>
                    ${renderTopList(top5Decrease, false)}
                </div>
            `;
            document.getElementById('board3-top-changes').innerHTML = topChangesHtml;
            if (window.lucide) window.lucide.createIcons(); // 鍒锋柊鎻掑叆瀹瑰櫒鍐呯殑鍥炬爣

            // 2. 鎺掑簭骞跺尯鍒?Top N 涓?"鍏朵粬" 鐨勯€氱敤鍑芥暟 (Board 3 涓嬫柟鐨勮〃鏍?
            const processChannels = (aggObj, topN) => {
                let sortedChannels = Object.keys(aggObj).sort((a, b) => aggObj[b].totalCurr - aggObj[a].totalCurr);
                let finalChannels = [];
                let others = { name: '鍏朵粬', curr: {5:0, 6:0, 7:0, 8:0, 9:0}, last: {5:0, 6:0, 7:0, 8:0, 9:0} };

                sortedChannels.forEach((ch, index) => {
                    if (index < topN) {
                        finalChannels.push({ name: ch, curr: aggObj[ch].curr, last: aggObj[ch].last });
                    } else {
                        b3Months.forEach(m => {
                            others.curr[m] += aggObj[ch].curr[m];
                            others.last[m] += aggObj[ch].last[m];
                        });
                    }
                });

                let hasOthers = b3Months.some(m => others.curr[m] > 0 || others.last[m] > 0);
                if (hasOthers) finalChannels.push(others);
                
                return finalChannels;
            };

            // 鍒嗗埆澶勭悊楂樿浆鍜屼綆杞殑 Top 8 鏁版嵁
            let finalHighChannels = processChannels(highChannelAgg, 8);
            let finalLowChannels = processChannels(lowChannelAgg, 8);

            // 3. 鍔ㄦ€佺敓鎴?Board 3 鐨?HTML 琛ㄤ綋
            let b3Html = '';

            const getB3YoYTag = (curr, last) => {
                if (last === 0 && curr === 0) return '-';
                if (last === 0) return '<span class="bg-green-tag">+100.00%</span>';
                let pct = ((curr - last) / last) * 100;
                let tagClass = pct >= 0 ? 'bg-green-tag' : 'bg-red-tag';
                let sign = pct > 0 ? '+' : '';
                return `<span class="${tagClass}">${sign}${pct.toFixed(2)}%</span>`;
            };

            const renderChannelGroup = (groupName, channels) => {
                if (channels.length === 0) return '';
                let html = '';
                let totalRows = channels.length * 3;

                channels.forEach((item, index) => {
                    let isFirst = index === 0;
                    let isLast = index === channels.length - 1;
                    let rowSpanHtml = isFirst ? `<td rowspan="${totalRows}" class="border py-2 px-2 align-middle font-bold bg-gray-50">${groupName}</td>` : '';
                    let trBorderClass = isLast ? 'border-b-2 border-gray-300' : '';
                    
                    html += `
                        <tr>
                            ${rowSpanHtml}
                            <td rowspan="3" class="border py-2 px-4 align-middle text-left">${item.name}</td>
                            <td class="border py-1 px-4 text-gray-700">${yearFilter}骞磋繘閲?/td>
                            ${b3Months.map(m => `<td class="border py-1 px-2">${Math.round(item.curr[m])}</td>`).join('')}
                        </tr>
                        <tr>
                            <td class="border py-1 px-4 text-gray-700">${yearFilter - 1}骞磋繘閲?/td>
                            ${b3Months.map(m => `<td class="border py-1 px-2">${Math.round(item.last[m])}</td>`).join('')}
                        </tr>
                        <tr class="bg-gray-50 ${trBorderClass}">
                            <td class="border py-1 px-4 text-gray-700 font-medium">鍚屾瘮</td>
                            ${b3Months.map(m => `<td class="border py-1 px-2">${getB3YoYTag(item.curr[m], item.last[m])}</td>`).join('')}
                        </tr>
                    `;
                });
                return html;
            };

            // 鎷兼帴琛ㄤ綋锛氶珮杞笭閬撳厛灞曠ず锛屼綆杞笭閬撳悗灞曠ず
            b3Html += renderChannelGroup('楂樿浆娓犻亾', finalHighChannels);
            b3Html += renderChannelGroup('浣庤浆娓犻亾', finalLowChannels);

            document.getElementById('board3-tbody').innerHTML = b3Html;
        }

        function showMessage(msg, isSuccess = true) {
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 px-6 py-3 rounded-lg shadow-lg z-[100] text-white transition-opacity duration-500 flex items-center gap-2 ${isSuccess ? 'bg-emerald-500' : 'bg-red-500'}`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 2500);
            setTimeout(() => toast.remove(), 3000);
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const rawJson = XLSX.utils.sheet_to_json(worksheet);
                
                trafficData = rawJson.map(row => {
                    let cleanRow = {};
                    for (let key in row) {
                        cleanRow[key.trim()] = typeof row[key] === 'string' ? row[key].trim() : row[key];
                    }
                    return cleanRow;
                });
                showMessage("<span>鉁?/span><span>娴侀噺搴曡〃宸茶В鏋愶紝璇风偣鍑汇€愯繍琛屻€戝埛鏂扮湅鏉裤€?/span>");
                e.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        // 浠庡閮ㄦ枃浠跺姞杞芥暟鎹紙鏀寔 JSON 鍜?TSV 涓ょ鏍煎紡锛?
        async function loadDataFromFile(url) {
            try {
                const resp = await fetch(url, { cache: 'no-cache' });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const text = await resp.text();
                
                if (url.endsWith('.json')) {
                    const jsonData = JSON.parse(text);
                    trafficData = jsonData.map(row => {
                        let obj = {};
                        for (let key in row) {
                            obj[key] = String(row[key] ?? '');
                        }
                        return obj;
                    });
                } else {
                    trafficData = parseTSVToJSON(text);
                }
                return true;
            } catch (err) {
                console.warn('鍔犺浇 ' + url + ' 澶辫触: ' + err.message);
                return false;
            }
        }

        window.onload = async () => {
            charts.board2 = echarts.init(document.getElementById('chart-board2'));

            // 浼樺厛浠庡閮?data.json 鍔犺浇锛屽け璐ュ垯灏濊瘯 data.tsv
            const jsonOk = await loadDataFromFile('data.json');
            if (jsonOk) {
                showMessage("<span>鉁?/span><span>宸蹭粠 data.json 鍔犺浇娴侀噺搴曡〃鏁版嵁</span>");
            } else {
                const tsvOk = await loadDataFromFile('data.tsv');
                if (tsvOk) {
                    showMessage("<span>鉁?/span><span>宸蹭粠 data.tsv 鍔犺浇娴侀噺搴曡〃鏁版嵁</span>");
                } else {
                    trafficData = [];
                    showMessage("<span>鈿狅笍</span><span>鏈兘鍔犺浇澶栭儴鏁版嵁鏂囦欢锛岃涓婁紶 Excel 搴曡〃</span>", false);
                }
            }

            document.getElementById('filterYear').addEventListener('change', renderDashboard);
            document.getElementById('filterMonth').addEventListener('change', renderDashboard);
            document.getElementById('filterCategory').addEventListener('change', renderDashboard); // 缁戝畾娓犻亾澶х被绛涢€?
            document.getElementById('uploadTraffic').addEventListener('change', handleFileUpload);
            document.getElementById('runBtn').addEventListener('click', renderDashboard);

            renderDashboard();

            window.addEventListener('resize', () => {
                Object.values(charts).forEach(c => c.resize());
            });
        };
    </script>
</body>
</html>
